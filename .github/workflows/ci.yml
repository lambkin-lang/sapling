name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 7 * * *"

jobs:
  test-and-bench:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    env:
      WASM_TOOLS_VERSION: 1.245.1
      WASI_SDK_VERSION: "24"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-wasm-tools-${{ env.WASM_TOOLS_VERSION }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-tools-

      - name: Install dependencies
        run: |
          # Use retry for apt-get
          for i in {1..5}; do sudo apt-get update && break || sleep 5; done
          sudo apt-get install -y cppcheck clang clang-format clang-tidy curl

          # Install wasm-tools from binary release (much faster than building from source)
          set -euo pipefail
          URL="https://github.com/bytecodealliance/wasm-tools/releases/download/v${WASM_TOOLS_VERSION}/wasm-tools-${WASM_TOOLS_VERSION}-x86_64-linux.tar.gz"
          curl -fsSL "$URL" | tar xz
          sudo mv wasm-tools-${WASM_TOOLS_VERSION}-x86_64-linux/wasm-tools /usr/local/bin/
          wasm-tools --version

          # Install pinned WASI SDK and export tool paths for wasm-check.
          SDK_TARBALL=""
          for SDK_URL in \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}-x86_64-linux.tar.gz" \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz" \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}-linux.tar.gz" \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-linux.tar.gz"; do
            if curl -fsSL "$SDK_URL" -o wasi-sdk.tar.gz; then
              SDK_TARBALL="wasi-sdk.tar.gz"
              break
            fi
          done
          if [[ -z "$SDK_TARBALL" ]]; then
            echo "Failed to download WASI SDK version ${WASI_SDK_VERSION}" >&2
            exit 1
          fi
          tar xzf "$SDK_TARBALL"
          SDK_DIR="$(find . -maxdepth 1 -type d -name 'wasi-sdk-*' | head -n 1)"
          if [[ -z "$SDK_DIR" ]]; then
            echo "Unable to locate extracted WASI SDK directory" >&2
            exit 1
          fi
          echo "WASI_SYSROOT=${GITHUB_WORKSPACE}/${SDK_DIR#./}/share/wasi-sysroot" >> "$GITHUB_ENV"
          echo "WASI_CC=${GITHUB_WORKSPACE}/${SDK_DIR#./}/bin/clang" >> "$GITHUB_ENV"
          echo "WASI_AR=${GITHUB_WORKSPACE}/${SDK_DIR#./}/bin/llvm-ar" >> "$GITHUB_ENV"
          "${GITHUB_WORKSPACE}/${SDK_DIR#./}/bin/clang" --version

      - name: Build and test
        run: make test CC=clang

      - name: Runner release checklist
        run: make runner-release-checklist CC=clang CLANG_FORMAT=clang-format CLANG_TIDY=clang-tidy WASM_TOOLS=wasm-tools

      - name: Wasm smoke check
        run: make wasm-check WASI_CC="${WASI_CC}" WASI_AR="${WASI_AR}" WASI_SYSROOT="${WASI_SYSROOT}"

      - name: No-malloc gate
        run: make nomalloc-check CC=clang

      - name: Leak check
        run: make leak-check CC=clang

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-logs
          path: |
            build/
            *.log
            benchmarks/

  gcc-secondary:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc
          gcc --version

      - name: Build and test with GCC
        run: make test CC=gcc

  macos-strict-leak-check:
    if: github.event_name != 'schedule'
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run strict leak check (macOS)
        run: make leak-check CC=clang

  seq-fuzz-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm
          clang --version

      - name: Seq fuzz smoke
        run: |
          mkdir -p .fuzz-corpus/seq
          make seq-fuzz \
            CC=clang \
            CXX=clang++ \
            LLVM_SYMBOLIZER="$(command -v llvm-symbolizer || true)" \
            SEQ_FUZZ_RUNS=5000 \
            SEQ_FUZZ_MAX_LEN=1024 \
            SEQ_FUZZ_CORPUS=.fuzz-corpus/seq

  text-fuzz-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm
          clang --version

      - name: Text fuzz smoke
        run: |
          mkdir -p .fuzz-corpus/text
          make text-fuzz \
            CC=clang \
            CXX=clang++ \
            LLVM_SYMBOLIZER="$(command -v llvm-symbolizer || true)" \
            TEXT_FUZZ_RUNS=5000 \
            TEXT_FUZZ_MAX_LEN=1024 \
            TEXT_FUZZ_CORPUS=.fuzz-corpus/text

  seq-fuzz-scheduled:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm
          clang --version

      - name: Seq fuzz long run
        run: |
          mkdir -p .fuzz-corpus/seq
          make seq-fuzz \
            CC=clang \
            CXX=clang++ \
            LLVM_SYMBOLIZER="$(command -v llvm-symbolizer || true)" \
            SEQ_FUZZ_RUNS=250000 \
            SEQ_FUZZ_MAX_LEN=4096 \
            SEQ_FUZZ_CORPUS=.fuzz-corpus/seq

      - name: Upload seq fuzz corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seq-fuzz-corpus-${{ github.run_id }}
          path: .fuzz-corpus/seq
          if-no-files-found: ignore

  text-fuzz-scheduled:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm
          clang --version

      - name: Text fuzz long run
        run: |
          mkdir -p .fuzz-corpus/text
          make text-fuzz \
            CC=clang \
            CXX=clang++ \
            LLVM_SYMBOLIZER="$(command -v llvm-symbolizer || true)" \
            TEXT_FUZZ_RUNS=250000 \
            TEXT_FUZZ_MAX_LEN=4096 \
            TEXT_FUZZ_CORPUS=.fuzz-corpus/text

      - name: Upload text fuzz corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: text-fuzz-corpus-${{ github.run_id }}
          path: .fuzz-corpus/text
          if-no-files-found: ignore
